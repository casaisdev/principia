<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <defs>
    <radialGradient id="bg" cx="27%" cy="50%" r="78%">
      <stop offset="0%" stop-color="#11151f"/>
      <stop offset="45%" stop-color="#0a0e16"/>
      <stop offset="100%" stop-color="#06080d"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8b24c" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#e8b24c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ostar" cx="50%" cy="42%" r="62%">
      <stop offset="0%" stop-color="#fff6e0"/>
      <stop offset="38%" stop-color="#ffd27a"/>
      <stop offset="100%" stop-color="#e8b24c"/>
    </radialGradient>
    <linearGradient id="oorbit1" x1="8" y1="30" x2="112" y2="90" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a8c5ff"/>
      <stop offset="100%" stop-color="#5d76a8"/>
    </linearGradient>
    <linearGradient id="oorbit2" x1="100" y1="20" x2="20" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#d8e4ff"/>
      <stop offset="100%" stop-color="#7c8aa8"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="330" cy="315" r="360" fill="url(#glow)"/>

  <!-- instrument bezel -->
  <rect x="28" y="28" width="1144" height="574" rx="3" fill="none" stroke="rgba(150,170,205,0.16)"/>
  <path d="M28 52 V28 H52" fill="none" stroke="#e8b24c" stroke-opacity="0.55"/>
  <path d="M1148 28 H1172 V52" fill="none" stroke="#e8b24c" stroke-opacity="0.55"/>
  <path d="M28 578 V602 H52" fill="none" stroke="#e8b24c" stroke-opacity="0.55"/>
  <path d="M1148 602 H1172 V578" fill="none" stroke="#e8b24c" stroke-opacity="0.55"/>

  <!-- starfield -->
  <g fill="#ffffff">
    <circle cx="120" cy="100" r="1.3" opacity="0.45"/>
    <circle cx="1050" cy="120" r="1.5" opacity="0.5"/>
    <circle cx="1110" cy="450" r="1.2" opacity="0.4"/>
    <circle cx="980" cy="540" r="1.4" opacity="0.45"/>
    <circle cx="640" cy="90" r="1.1" opacity="0.35"/>
    <circle cx="200" cy="540" r="1.4" opacity="0.45"/>
    <circle cx="90" cy="330" r="1.1" opacity="0.35"/>
    <circle cx="560" cy="560" r="1.2" opacity="0.4"/>
    <circle cx="1120" cy="250" r="1.1" opacity="0.35"/>
    <circle cx="780" cy="150" r="1" opacity="0.3"/>
  </g>

  <!-- orbital mark -->
  <g transform="translate(300 315) scale(2.7) translate(-60 -60)">
    <ellipse cx="60" cy="60" rx="52" ry="22" transform="rotate(-25 60 60)"
             stroke="url(#oorbit1)" stroke-width="3.4" stroke-linecap="round" opacity="0.95"/>
    <ellipse cx="60" cy="60" rx="40" ry="17" transform="rotate(38 60 60)"
             stroke="url(#oorbit2)" stroke-width="2.6" stroke-linecap="round" opacity="0.75"/>
    <circle cx="60" cy="60" r="13" fill="url(#ostar)"/>
    <circle cx="107.1" cy="38" r="6" fill="#a8c5ff"/>
    <circle cx="86" cy="87.7" r="4.6" fill="#f5c66b"/>
  </g>

  <!-- wordmark -->
  <text x="560" y="300" font-family="Spectral, Georgia, serif" font-size="94"
        font-weight="600" fill="#e6eaf2" letter-spacing="0.5">Principia</text>
  <text x="563" y="350" font-family="'IBM Plex Mono', Consolas, monospace" font-size="22"
        fill="#828da3" letter-spacing="3">N-BODY GRAVITATION</text>
  <text x="564" y="398" font-family="'IBM Plex Mono', Consolas, monospace" font-size="22"
        fill="#e8b24c" letter-spacing="1">F = G · m₁m₂ / r²</text>
</svg>
